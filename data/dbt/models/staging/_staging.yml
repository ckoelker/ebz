version: 2

models:
  - name: stg_vendure_orders
    columns:
      - name: order_id
        data_tests: [unique, not_null]
  - name: stg_vendure_order_lines
    columns:
      - name: order_line_id
        data_tests: [unique, not_null]
  - name: stg_vendure_installments
    columns:
      - name: installment_id
        data_tests: [unique, not_null]
      - name: status
        data_tests:
          # Plain-Syntax (statt 1.11-`arguments:`) für max. Kompatibilität mit dem
          # von Lightdash gebündelten dbt (M4); unser dbt 1.11 warnt nur (Deprecation).
          - accepted_values:
              values: ['scheduled', 'invoiced']
  - name: stg_vendure_seminar_cost
    columns:
      - name: cost_id
        data_tests: [unique, not_null]
  - name: stg_rechnung_belege
    columns:
      - name: rechnung_id
        data_tests: [unique, not_null]
  - name: stg_rechnung_positionen
    columns:
      - name: position_id
        data_tests: [unique, not_null]
  - name: stg_rechnung_debitoren
    columns:
      - name: debitor_id
        data_tests: [unique, not_null]
  - name: stg_hubspot_deals
    columns:
      - name: deal_id
        data_tests: [unique, not_null]
      - name: currency
        data_tests:
          - accepted_values:
              values: ['EUR']
