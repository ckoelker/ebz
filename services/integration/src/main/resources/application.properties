# EBZ Controlling — Integration (M1). Werte überschreibbar per Env (Compose/.env).
quarkus.application.name=ebz-controlling-integration
quarkus.http.port=8090

# ── Dev-Mode (Live-Reload) ──
# Instrumentation-basierter Reload: Methodenrumpf-Änderungen werden ohne JVM-Restart übernommen
# (kein Voll-Build pro Change). Greift NUR im `mvn quarkus:dev`. Siehe dev.sh.
%dev.quarkus.live-reload.instrumentation=true

# ── Warehouse: DB `controlling` (Single-Postgres) ──
# Host-Lauf: localhost:6543 · Container-Lauf: postgres:5432 (per Env QUARKUS_DATASOURCE_* setzen)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${CONTROLLING_USER:controlling}
quarkus.datasource.password=${CONTROLLING_PASSWORD:controlling}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:6543}/${CONTROLLING_DB:controlling}
# Dev/Showcase: Schema (stg_hubspot_deal + bildung.bildungsangebot) automatisch anlegen/aktualisieren.
# Prod = Migration. (aktueller Schlüssel; database.generation ist deprecated)
quarkus.hibernate-orm.schema-management.strategy=update

# ── Formularverwaltung P1.0 — Bildungsangebote (Schema `bildung`) ──
# Das Schema `bildung` liegt explizit am @Table(schema="bildung"); stg_hubspot_deal bleibt unberührt
# im Default-Schema (KEIN globales default-schema, sonst zieht es die M1-Tabelle mit um).
# Das DB-Schema selbst legt Postgres an (initdb / live psql); Hibernate-update erzeugt nur die Tabelle.
quarkus.smallrye-openapi.info-title=EBZ MDM — Bildungsangebote
quarkus.smallrye-openapi.info-version=0.1.0

# ── Naht zu Vendure (P1.3, §11.6) — Shop-Projektion verkäuflicher Angebote ──
# Quarkus ruft die Vendure-Admin-GraphQL-API (createProduct/updateProduct) und schreibt vendureProductId
# zurück. Container: http://server:3000 (Compose-Service-Name); Host-Lauf: http://localhost:3000.
# Auth = nativer Superadmin-Login (Creds aus dem Vendure-Compose-Env); Prod = Keycloak-Service-Account.
quarkus.rest-client.vendure-admin.url=${VENDURE_ADMIN_URL:http://localhost:3000}
vendure.superadmin.username=${SUPERADMIN_USERNAME:superadmin}
vendure.superadmin.password=${SUPERADMIN_PASSWORD:superadmin}

# ── LLM (OpenAI) — Differenzierer-Anreicherung ──
# AVV/DPA mit OpenAI vorhanden (Auftragsverarbeitung, DSGVO-konform). On-prem Ollama = Alternative.
# ingestion.llm.enabled=false ODER fehlender/ungültiger API-Key → regelbasierter Fallback (enrichedBy=FALLBACK).
ingestion.llm.enabled=true
# API-Key via Env OPENAI_API_KEY (Platzhalter-Default, damit der Start nicht bricht → sonst Fallback).
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:no-key}
quarkus.langchain4j.openai.timeout=PT60S
quarkus.langchain4j.openai.log-requests=false
quarkus.langchain4j.openai.chat-model.model-name=${OPENAI_MODEL:gpt-4o-mini}
# L9: deterministisch + erzwungenes JSON (structured output)
quarkus.langchain4j.openai.chat-model.temperature=0
quarkus.langchain4j.openai.chat-model.response-format=json_object

# Kommunikation K4 (MCP-Demo): hauseigener MCP-Server (HTTP/SSE), der externen KI-Agenten den sichtbaren
# Aktivitätslog als Tool anbietet (AktivitaetslogMcpServer). Server-Kennung im MCP-Handshake.
quarkus.mcp.server.server-info.name=ebz-kommunikation
quarkus.mcp.server.server-info.version=0.1.0
# Härtung: der MCP-Server ist NICHT mehr offen — Zugriff nur mit gültigem Staff-Token UND Rolle
# mcp-zugriff (Keycloak-Service-Account `mcp-client`, Client-Credentials = Scope). Default-Tenant ebz-staff.
quarkus.http.auth.permission.mcp.paths=/mcp,/mcp/*
quarkus.http.auth.permission.mcp.policy=mcp-policy
quarkus.http.auth.policy.mcp-policy.roles-allowed=mcp-zugriff
# Test: OIDC ist aus (%test.quarkus.oidc.enabled=false) → MCP-Pfad freigeben, damit McpAssured (ohne Token)
# den Server-Vertrag (tools/list, tools/call, Allowlist-Gegenprobe) weiterhin prüfen kann.
%test.quarkus.http.auth.permission.mcp.policy=permit

# ── Ingestion ──
# source=fixture (Default, Mock) | hubspot (Real-Modus, benötigt hubspot.token)
ingestion.source=${INGESTION_SOURCE:fixture}
ingestion.fixture-path=fixtures/hubspot-deals.sample.json
# Timer: erster Pull nach 'delay', danach alle 'period' ms (Default 1 h)
ingestion.timer.delay=${INGESTION_DELAY:5000}
ingestion.timer.period=${INGESTION_PERIOD:3600000}
# Autostart des Timers (für reine REST-Trigger-Demos auf false setzen)
ingestion.timer.enabled=${INGESTION_TIMER_ENABLED:true}
# L10: unter dieser Konfidenz wird der Datensatz zur manuellen Prüfung markiert (kein Auto-Merge)
ingestion.review-threshold=0.6

# ── Test-Profil: HubSpot/Camel-Timer + LLM aus, damit der Bildung-Spec-Test (rest-assured)
#    isoliert gegen /q/openapi startet, ohne externe Calls auszulösen. ──
%test.ingestion.timer.enabled=false
%test.ingestion.llm.enabled=false
# Camel-Routen im Test NICHT starten (kein Test nutzt die Ingestion-Route) — spart Startup/Lograuschen.
# Ein Test, der Camel braucht, kann das per @TestProfile (camel.main.auto-startup=true) überschreiben.
%test.camel.main.auto-startup=false
# OIDC im Test aus (kein echtes Keycloak nötig); RBAC-Endpunkte deckt @TestSecurity ab.
%test.quarkus.oidc.enabled=false

# ── OIDC Resource-Server (P1.2 RBAC, Realm ebz-staff) ──
# EINE URL für Browser (Login) UND Container (Token-Validierung): keycloak.localhost:8080
# (Browser lösen *.localhost→127.0.0.1, Container über den Compose-Netz-Alias). So matcht der
# Token-Issuer in beiden Welten. application-type=service → reiner Bearer-Token-Validator.
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://keycloak.localhost:8080/realms/ebz-staff}
quarkus.oidc.application-type=service
# Keycloak legt Realm-Rollen unter realm_access.roles ab → für @RolesAllowed dort suchen.
quarkus.oidc.roles.role-claim-path=realm_access/roles
# Ohne Token bleiben nicht-annotierte Endpunkte offen (GET-Listen/Registry); nur @RolesAllowed
# erzwingt Token+Rolle. Discovery beim Start nicht hart erzwingen (Stack-Startreihenfolge).
quarkus.oidc.tenant-enabled=true

# ── Zweiter OIDC-Tenant: Außenportal-Kunden (Realm ebz-customers, Public-Client ebz-portal) ──
# Die @Authenticated-Portal-Endpunkte (RechnungPortalResource, PortalResource, PartyResource.login/
# firmensicht) tragen @Tenant("customers") und werden gegen DIESEN Realm validiert; alle übrigen
# (Staff/RBAC) bleiben am Default-Tenant ebz-staff. Gleiche keycloak.localhost:8080-URL wie der
# Staff-Tenant, damit der Token-Issuer in Browser UND Container matcht.
quarkus.oidc.customers.auth-server-url=${OIDC_CUSTOMERS_AUTH_SERVER_URL:http://keycloak.localhost:8080/realms/ebz-customers}
quarkus.oidc.customers.application-type=service
quarkus.oidc.customers.roles.role-claim-path=realm_access/roles

# ── GoBD-Archiv (R2, §4 Säule 4) — validiertes ZUGFeRD revisionssicher in MinIO-WORM ──
# Bei der Festschreibung wird das validierte ZUGFeRD-PDF in einen Object-Lock-Bucket gelegt; je Objekt
# eine Retention (COMPLIANCE = echtes WORM, auch root kann sie nicht verkürzen), Standard 10 Jahre.
# Container: MINIO_URL=http://minio:9000 setzen; Host-Lauf nutzt localhost:9000.
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ROOT_USER:minioadmin}
minio.secret-key=${MINIO_ROOT_PASSWORD:minioadmin}
rechnung.gobd.archiv.enabled=${GOBD_ARCHIV_ENABLED:true}
rechnung.gobd.bucket=${GOBD_BUCKET:gobd-rechnungen}
rechnung.gobd.retention-mode=${GOBD_RETENTION_MODE:COMPLIANCE}
rechnung.gobd.retention-days=${GOBD_RETENTION_DAYS:3650}
# Test: Archiv standardmäßig AUS, damit Lebenszyklus-/ZUGFeRD-Endpoint-Tests ohne MinIO laufen.
# Der dedizierte GobdArchivTest aktiviert es gezielt per @TestProfile gegen das laufende MinIO.
%test.rechnung.gobd.archiv.enabled=false

# ── HubSpot (Real-Modus) ──
# hubspot.token NICHT hier setzen: die Env-Variable HUBSPOT_TOKEN wird von Quarkus automatisch
# auf 'hubspot.token' gemappt; ungesetzt greift der Java-@ConfigProperty(defaultValue="") → Fixture.
hubspot.base-url=${HUBSPOT_BASE_URL:https://api.hubapi.com}
# L6: nur die Inhouse-Pipeline zählt; Fremdwährung wird verworfen (EUR erzwungen)
hubspot.inhouse-pipeline=${HUBSPOT_INHOUSE_PIPELINE:inhouse}
hubspot.page-size=100

# ── HubSpot-Outbound-Sync (MDM→HubSpot) ──
# Senke: mock (Default, ohne echtes HubSpot, zeichnet Aufrufe auf) | real (Camel-HTTP, ab H4, braucht hubspot.token).
hubspot.sync.mode=${HUBSPOT_SYNC_MODE:mock}
# Dispatcher-Autostart der Sync-Outbox; Test AUS (Aufträge werden im Test gezielt getriggert).
hubspot.sync.enabled=${HUBSPOT_SYNC_ENABLED:true}
%test.hubspot.sync.enabled=false
hubspot.sync.batch-size=50
hubspot.sync.dispatcher.every=${HUBSPOT_SYNC_EVERY:15s}
# Recht auf Vergessen: true = permanenter HubSpot-GDPR-Delete; false = Archiv-Fallback + Status MANUELL
# (endgültige Löschung übernimmt ein Mensch im Cockpit). Irreversibel → bewusst schaltbar.
hubspot.sync.gdpr-delete.enabled=${HUBSPOT_GDPR_DELETE:true}
# Subscription-/Communication-Preferences-API: braucht den Scope communication_preferences (seit 2026-06-22
# am Token). Property-basierter Consent (ebz_marketing_consent) bleibt IMMER maßgeblich; bei true wird die
# echte HubSpot-Subscription zusätzlich gespiegelt (403-/fehler-sicher → kein Sync-Abbruch).
hubspot.sync.subscriptions.enabled=${HUBSPOT_SUBSCRIPTIONS:true}
# Marketing-Subscription-Typ (portal-spezifisch; via GET /communication-preferences/v3/definitions ermittelt).
# Portal 148573462: 2785628533 = „Marketing Information" (Email). Leer → Subscription-Spiegelung aus.
hubspot.sync.subscription-id=${HUBSPOT_SUBSCRIPTION_ID:2785628533}

# ── HubSpot-Consent-Rückkanal (Webhook HubSpot→MDM) ──
# Default AUS. Aktivieren, sobald in der Private App eine Webhook-Subscription auf den Endpunkt zeigt.
hubspot.webhook.enabled=${HUBSPOT_WEBHOOK_ENABLED:false}
%test.hubspot.webhook.enabled=false
# Öffentliche Prod-URL, die HubSpot aufruft — Basis der Signatur-URI (hinter Reverse-Proxy ≠ interne URL).
hubspot.webhook.public-base-url=${HUBSPOT_WEBHOOK_PUBLIC_URL:}
# App-Client-Secret aus der Private App (Tab „Auth") für die X-HubSpot-Signature-v3-Prüfung; via Env/Secret.
hubspot.webhook.app-secret=${HUBSPOT_WEBHOOK_SECRET:}
# Replay-Fenster in Sekunden (Default 5 min): ältere Request-Timestamps werden abgewiesen.
hubspot.webhook.toleranz-sekunden=${HUBSPOT_WEBHOOK_TOLERANZ:300}

# ── E-Mail (Anmeldung Berufsschule A0) ──
# Absender + SMTP-Senke. Dev → Mailpit (Container: MAIL_HOST=mailpit; Host-Lauf: localhost:1025),
# keine TLS/Auth. Test nutzt automatisch die Quarkus-MockMailbox (kein echter SMTP-Verkehr).
quarkus.mailer.from=${MAIL_FROM:anmeldung@ebz.localhost}
quarkus.mailer.host=${MAIL_HOST:localhost}
quarkus.mailer.port=${MAIL_PORT:1025}
quarkus.mailer.start-tls=DISABLED

# ── KI-Dubletten-Berater (Anmeldung Berufsschule B) ──
# Schlägt Merge-Kandidaten vor (HITL entscheidet). Anbieter umschaltbar über die langchain4j-Config
# (quarkus.langchain4j.chat-model.provider): Default OpenAI (DPA), On-Prem-Ollama als Alternative.
# Ohne/ungültigen Key → regelbasierter Fallback (UNSICHER). Test: KI aus → deterministischer Fallback.
anmeldung.dubletten.ki.enabled=${ANMELDUNG_DUBLETTEN_KI:true}
%test.anmeldung.dubletten.ki.enabled=false
# KI-Urteils-Cache (KiUrteilCache): identische Merkmals-Paare teilen einen LLM-Call. Expiry, damit ein
# transienter regelbasierter Fallback (KI kurz nicht erreichbar) nicht dauerhaft hängenbleibt.
quarkus.cache.caffeine."dubletten-ki-urteil".expire-after-write=PT30M

# ── KI-Firmen-Anreicherung (A15: „Daten online ziehen") ──
# Streamt VIES-Check + Impressum-Fetch (im Showcase gemockt) + LLM-Extraktion über WebSocket.
# Ohne KI/Key → deterministischer Heuristik-Fallback. Test: KI aus → Fallback-Extraktion.
crm.anreicherung.ki.enabled=${CRM_ANREICHERUNG_KI:true}
%test.crm.anreicherung.ki.enabled=false

# ── Keycloak-Login-Provisionierung (Anmeldung Berufsschule C) ──
# Admin-Client meldet sich am master-Realm an (admin/admin im Dev-Compose) und legt Customer-User im
# Realm `ebz-customers` an. Test: Provisionierung AUS → Keycloak wird nicht kontaktiert (Mail geht trotzdem).
quarkus.keycloak.admin-client.server-url=${KEYCLOAK_ADMIN_URL:http://localhost:8088}
quarkus.keycloak.admin-client.realm=master
quarkus.keycloak.admin-client.client-id=admin-cli
quarkus.keycloak.admin-client.username=${KEYCLOAK_ADMIN:admin}
quarkus.keycloak.admin-client.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
quarkus.keycloak.admin-client.grant-type=password
anmeldung.provisionierung.enabled=${ANMELDUNG_PROVISIONIERUNG:true}
anmeldung.provisionierung.realm=${ANMELDUNG_CUSTOMER_REALM:ebz-customers}
anmeldung.portal.url=${ANMELDUNG_PORTAL_URL:http://localhost:5174}
%test.anmeldung.provisionierung.enabled=false

# ── Drittsystem-Provisionierung (Outbox-Pattern) ──
# Bei Vertragsbestätigung wird je Zielsystem (WebUntis …) ein Outbox-Auftrag in derselben DB-TX
# geschrieben; dieser Dispatcher zieht offene/fällige Aufträge im Takt und stellt sie zu (idempotent,
# Backoff-Retry, Dead-Letter → HITL). Showcase: kurzer Takt; Prod ggf. höher.
outbox.dispatcher.every=${OUTBOX_DISPATCHER_EVERY:15s}
outbox.dispatcher.batch-size=${OUTBOX_DISPATCHER_BATCH:50}
# Test: kurzer Takt (5s) statt 15s, damit die async Zustellung im Test schnell greift. Tests, die ein
# deterministisches Versuchs-Counting brauchen (Dead-Letter), schalten den Scheduler per @TestProfile aus.
%test.outbox.dispatcher.every=5s

# ── LMS-Anbindung (OpenOLAT) — Einschreibungs-Provisionierung (L2) ──
# Der EnrollmentDispatcher zieht fällige Kurseinschreibungen (eigener Outbox-Datensatz) und stellt sie
# idempotent in OpenOLAT zu (ensureUser-by-KEYCLOAK-Sub + enrol). Container: OPENOLAT_RESTAPI_URL=
# http://openolat:8080; Host-Lauf nutzt localhost:8089. Auth = OpenOLAT-Admin (Prod: Service-Account).
quarkus.rest-client.openolat.url=${OPENOLAT_RESTAPI_URL:http://localhost:8089}
openolat.admin.username=${OPENOLAT_ADMIN_USER:administrator}
openolat.admin.password=${OPENOLAT_ADMIN_PASSWORD:openolat}
lms.dispatcher.every=${LMS_DISPATCHER_EVERY:15s}
lms.dispatcher.batch-size=${LMS_DISPATCHER_BATCH:50}
# Browser-seitige OpenOLAT-Basis-URL für den SSO-Launch-Deeplink (Portal „Meine Trainings"). Anders als
# die Server-zu-Server-URL oben: der Browser löst localhost:8089 (Container-Server-Name openolat:8080
# wäre vom Browser nicht erreichbar). Launch = {public-url}/url/RepositoryEntry/{openolatKey}.
openolat.public-url=${OPENOLAT_PUBLIC_URL:http://localhost:8089}
# Test: Dispatcher faktisch aus (großer Takt) → der Test treibt verarbeiteFaellige() deterministisch selbst;
# OpenolatProvisioning wird per @io.quarkus.test.Mock ersetzt (kein echter OpenOLAT-Call).
%test.lms.dispatcher.every=600s

# ── Mandanten-Schicht (PoC) — Org-Projektion nach OpenOLAT (M2, eigene Outbox G1) ──
# Der MandantProjektionDispatcher zieht fällige MandantProjektionen und legt je Mandant idempotent eine
# OpenOLAT-Organisation an (externalId = Mandant-Schlüssel), schreibt openolatOrganisationKey zurück.
mandant.dispatcher.every=${MANDANT_DISPATCHER_EVERY:15s}
mandant.dispatcher.batch-size=${MANDANT_DISPATCHER_BATCH:50}
# Test: Dispatcher faktisch aus → der Test treibt verarbeiteFaellige() selbst; OpenolatOrganisationProvisioning
# wird per @io.quarkus.test.Mock ersetzt (kein echter OpenOLAT-Call).
%test.mandant.dispatcher.every=600s
# M3: Keycloak-Organization-Projektion (föderierte B2B-Mandanten). Realm, in dem die Organizations + der
# gebrokerte Kunden-IdP leben (= Kunden-Realm). KeycloakOrganizationsProvisioning nutzt den bereits
# konfigurierten quarkus.keycloak.admin-client (master/admin-cli); im Test per @io.quarkus.test.Mock ersetzt.
mandant.keycloak.realm=${MANDANT_KEYCLOAK_REALM:ebz-customers}

# ── Kommunikations-System K0 — Zustell-Outbox (PORTAL synchron, EMAIL/SMS async) ──
# Bei einem person-relevanten Ereignis entsteht synchron die Portal-Inbox-Kopie; externe Kanäle laufen
# über einen ZustellAuftrag (eigene Transactional-Outbox, aus OutboxService herausgelöst), den dieser
# Dispatcher im Takt zieht (idempotent, Backoff-Retry, Dead-Letter → HITL).
kommunikation.dispatcher.every=${KOMMUNIKATION_DISPATCHER_EVERY:15s}
kommunikation.dispatcher.batch-size=${KOMMUNIKATION_DISPATCHER_BATCH:50}
# Test: Dispatcher faktisch aus (großer Takt) → der Test treibt verarbeiteFaellige() deterministisch selbst.
%test.kommunikation.dispatcher.every=600s
# K1b Digest-Bündelung: Sammel-Versand-Takt (Showcase kurz; Prod z. B. stündlich/täglich).
kommunikation.digest.every=${KOMMUNIKATION_DIGEST_EVERY:1h}
# Test: faktisch aus → der Test treibt versendeFaellige() deterministisch selbst.
%test.kommunikation.digest.every=600s
# K5 Pflicht-Bestätigungs-Workflow: Takt des Erinnerungs-/Eskalations-Laufs + Nachfass-Intervall.
kommunikation.bestaetigung.every=${KOMMUNIKATION_BESTAETIGUNG_EVERY:1h}
kommunikation.bestaetigung.erinnerung-intervall=${KOMMUNIKATION_BESTAETIGUNG_ERINNERUNG:PT24H}
# Test: Lauf faktisch aus (Test treibt verarbeiteFaellige() selbst); Nachfass-Intervall 0 → Erinnerung sofort fällig.
%test.kommunikation.bestaetigung.every=600s
%test.kommunikation.bestaetigung.erinnerung-intervall=PT0S
# Betriebs-Steuerung der @Scheduled-Jobs (POST /betrieb/scheduler/pause|resume, Header X-Betrieb-Token).
# Pausiert die Dispatcher während eines Testlaufs gegen die geteilte DB → kein SKIP-LOCKED-Race mit der
# Test-JVM (statt docker stop). Secret nur als Header-Schutz (kein OIDC), in Prod via Env überschreiben.
betrieb.steuer.token=${BETRIEB_STEUER_TOKEN:showcase-betrieb-dev}

# ── Prozessdoku (Living Documentation) — OpenTelemetry-Business-Spans ──
# Jeder fachliche Prozess-Schritt = ein Span (Prozessspur). Dual-use: Prod → Jaeger (OTLP),
# E2E-Test → SpanLogExporter → spans.jsonl → PM4py → BPMN (showcase/prozessdoku/, Plan prozessdoku-planung/).
quarkus.otel.service.name=ebz-integration
# Container: OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317 setzen; Host-Lauf nutzt localhost.
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
# W3C-Baggage propagiert die Fall-Korrelation `prozess.fall` über Systemgrenzen (Prod: SPA→Backend→…;
# Test: rest-assured-Header `baggage: prozess.fall=<szenario>`). Prozessspur liest sie aus dem Kontext.
quarkus.otel.propagators=tracecontext,baggage
# Im Test KEIN OTLP-Export (kein Collector nötig); das SDK bleibt aktiv, damit der CDI-SpanProcessor
# (SpanLogExporter) die Business-Spans erhält und nach spans.jsonl schreibt.
%test.quarkus.otel.traces.exporter=none

# ── DATEV-Cloud (D1): Buchungsdatenservice (accounting:extf-files) ──
# Aktiver Übergabeweg: extf (CSV-Brücke, Default) | cloud-mock | cloud (echter Buchungsdatenservice).
datev.modus=${DATEV_MODUS:extf}
# REST-Client-Basen (host-only; Pfade liegen in den Client-Interfaces). Sandbox-Defaults; per Env auf
# Produktion umstellbar. Im Test überschreibt DatevWireMockResource diese auf den WireMock-Port.
quarkus.rest-client.datev-token.url=${DATEV_TOKEN_URL:https://sandbox-api.datev.de}
quarkus.rest-client.datev-extf.url=${DATEV_EXTF_URL:https://accounting-extf-files.api.datev.de}
# D2 Belegbilder (accounting:documents / Belege online)
quarkus.rest-client.datev-documents.url=${DATEV_DOCUMENTS_URL:https://accounting-documents.api.datev.de}
# OAuth-/Mandant-Zugang — Secrets aus .env (gitignored). client-id ist zugleich der Pflicht-Header
# X-DATEV-Client-Id; der refresh-token rotiert (DatevTokenService hält den neuen Wert).
datev.cloud.client-id=${DATEV_CLIENT_ID:}
datev.cloud.client-secret=${DATEV_CLIENT_SECRET:}
datev.cloud.refresh-token=${DATEV_REFRESH_TOKEN:}
datev.cloud.mandant=${DATEV_SANDBOX_CLIENT_ID:455148-2}

# ── DATEV-OPOS-Regelkreis (D3): ausgeglichene offene Posten → Rechnung BEZAHLT ──
# Zahlungsstatus kommt bei DATEV NUR über DATEVconnect (on-prem, Kanzlei) — keine Cloud-Sandbox; der
# Showcase nutzt eine Mock-Quelle (OposQuelleMock). Der Dispatcher zieht im Takt; im Test faktisch aus
# (großer Takt) → der Test treibt verarbeiteFaellige() deterministisch selbst.
opos.dispatcher.every=${OPOS_DISPATCHER_EVERY:15s}
opos.dispatcher.batch-size=${OPOS_DISPATCHER_BATCH:50}
%test.opos.dispatcher.every=600s
