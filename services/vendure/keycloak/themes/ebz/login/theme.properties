# EBZ-gebrandetes Login-/Registrierungs-Theme (Realm ebz-customers).
# Erbt vom Standard-Keycloak-Login-Theme (PatternFly) und legt nur EBZ-Branding obendrauf:
# css/login.css wird aus dem Eltern-Theme aufgelöst, css/ebz.css aus diesem Theme.
parent=keycloak
import=common/keycloak

styles=css/login.css css/ebz.css

# Eigene Marken-Eigenschaften (in ftl/CSS nutzbar)
kcLogoIdP-google=fa fa-google
