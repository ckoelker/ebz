# MDM-Cockpit (Formularverwaltung P1.0) — nginx serviert die SPA + proxyt die API auf den
# Quarkus-bildung-Service (Container `integration`). Gleicher Origin wie im Vite-Dev-Proxy.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + Spec → Quarkus-Service (Compose-Netz, Servicename `integration`).
    location /bildung/ {
        proxy_pass http://integration:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /crm/ {
        proxy_pass http://integration:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /party/ {
        proxy_pass http://integration:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    # K2: Admin↔Person-Nachrichten (Threads + Co-Pilot-Entwurf).
    location /kommunikation/ {
        proxy_pass http://integration:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /q/ {
        proxy_pass http://integration:8090;
        proxy_set_header Host $host;
    }
    # A15: WebSocket-Anreicherung („Daten online ziehen") — HTTP/1.1 + Upgrade-Header.
    location /ws/ {
        proxy_pass http://integration:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # SPA-History-Fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
