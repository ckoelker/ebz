# Globale JUnit-Extensions per ServiceLoader aktivieren (META-INF/services/...Extension) — registriert
# die DispatcherPauseExtension für ALLE Tests: pausiert vor dem Lauf einmal die Container-Scheduler und
# setzt sie danach fort (kein SKIP-LOCKED-Race auf der geteilten DB; ersetzt das frühere docker stop).
junit.jupiter.extensions.autodetection.enabled=true
# AutoCloseable-Store-Werte am Ende automatisch schließen (Resume-Hook am Laufende).
junit.jupiter.extensions.store.autoclose.enabled=true
