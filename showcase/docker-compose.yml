# Showcase — Vendure-Shop + Controlling auf EINEM Postgres (Docker).
# Liegt im Repo-Root `showcase/`; Vendure-Code/Dockerfile in `./vendure`.
# Variablen kommen aus `showcase/.env` (Compose liest sie automatisch); alle mit
# Default, sodass der Stack auch ohne .env startet. Siehe .env.example.
#
#   cd showcase && docker compose up --build       # build + start
#   danach einmalig:  (cd vendure && pnpm run seed) # Katalog seeden (Server muss laufen)
#   API :3000/shop-api · Admin :3000/admin-api · GraphiQL :3000/graphiql · Health :3000/health
#   Adminer :8082 (Server: postgres · DBs: vendure | controlling | lightdash)
#   Keycloak :8088 (admin/admin)

services:
  # Single Source of Truth: EIN Postgres-Container hält alle DBs —
  #   vendure (Shop) · controlling (Warehouse) · lightdash (BI-Metadaten).
  # Das initdb-Script legt die zusätzlichen DBs + eigene User an (nur bei leerem Volume).
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vendure}
      POSTGRES_USER: ${POSTGRES_USER:-vendure}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vendure}
      # vom initdb-Script genutzt (zusätzliche DBs + dedizierte User):
      CONTROLLING_DB: ${CONTROLLING_DB:-controlling}
      CONTROLLING_USER: ${CONTROLLING_USER:-controlling}
      CONTROLLING_PASSWORD: ${CONTROLLING_PASSWORD:-controlling}
      LIGHTDASH_DB: ${LIGHTDASH_DB:-lightdash}
      LIGHTDASH_USER: ${LIGHTDASH_USER:-lightdash}
      LIGHTDASH_PASSWORD: ${LIGHTDASH_PASSWORD:-lightdash}
      READER_USER: ${READER_USER:-controlling_reader}
      READER_PASSWORD: ${READER_PASSWORD:-controlling_reader}
    ports:
      - "${POSTGRES_PORT:-6543}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vendure} -d ${POSTGRES_DB:-vendure}"]
      interval: 5s
      timeout: 5s
      retries: 12

  server:
    build: ./vendure
    restart: unless-stopped
    command: pnpm run start:server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: dev
      SERVE_DASHBOARD: "false"
      PORT: "3000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-vendure}
      DB_USERNAME: ${POSTGRES_USER:-vendure}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vendure}
      VENDURE_HOST: http://localhost:${VENDURE_PORT:-3000}
      # Keycloak SSO: Issuer = öffentliche URL (Token-Claim), JWKS = interne Container-URL.
      # Bei geändertem KEYCLOAK_PORT auch frontend/.env.development anpassen.
      KEYCLOAK_ISSUER_CUSTOMERS: http://localhost:${KEYCLOAK_PORT:-8088}/realms/ebz-customers
      KEYCLOAK_JWKS_CUSTOMERS: http://keycloak:8080/realms/ebz-customers/protocol/openid-connect/certs
      KEYCLOAK_ISSUER_STAFF: http://localhost:${KEYCLOAK_PORT:-8088}/realms/ebz-staff
      KEYCLOAK_JWKS_STAFF: http://keycloak:8080/realms/ebz-staff/protocol/openid-connect/certs
      COOKIE_SECRET: ${COOKIE_SECRET:-showcase-dev-secret}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-superadmin}
    ports:
      - "${VENDURE_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  worker:
    build: ./vendure
    restart: unless-stopped
    command: pnpm run start:worker
    depends_on:
      server:
        condition: service_healthy
    environment:
      APP_ENV: dev
      SERVE_DASHBOARD: "false"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-vendure}
      DB_USERNAME: ${POSTGRES_USER:-vendure}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vendure}
      VENDURE_HOST: http://localhost:${VENDURE_PORT:-3000}
      KEYCLOAK_ISSUER_CUSTOMERS: http://localhost:${KEYCLOAK_PORT:-8088}/realms/ebz-customers
      KEYCLOAK_JWKS_CUSTOMERS: http://keycloak:8080/realms/ebz-customers/protocol/openid-connect/certs
      KEYCLOAK_ISSUER_STAFF: http://localhost:${KEYCLOAK_PORT:-8088}/realms/ebz-staff
      KEYCLOAK_JWKS_STAFF: http://keycloak:8080/realms/ebz-staff/protocol/openid-connect/certs
      COOKIE_SECRET: ${COOKIE_SECRET:-showcase-dev-secret}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-superadmin}

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    command: ["start-dev", "--import-realm"]
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8088}:8080"
      # Zusätzlicher Port für die EINE OIDC-URL, die Browser UND Container teilen
      # (M4): http://keycloak.localhost:8080 — Browser lösen *.localhost→127.0.0.1
      # auf (RFC 6761), Container über den Netz-Alias unten. So bleibt die Shop-SSO
      # auf localhost:8088 unangetastet, ohne hosts-Datei-Eingriff.
      - "8080:8080"
    networks:
      default:
        aliases:
          - keycloak.localhost
    volumes:
      - ./vendure/keycloak/realms:/opt/keycloak/data/import:ro

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${ADMINER_PORT:-8082}:8080"

  # ── Controlling (M1+) — nur mit Profil `controlling` gestartet ──
  #   docker compose --profile controlling up -d --build
  # So bleibt der Shop-Stack schlank; die Integration wird nur bei Bedarf gebaut.

  # HubSpot-Ingestion (Camel Quarkus + LangChain4j/OpenAI) → Warehouse-DB `controlling`.
  # KI-Anreicherung via OpenAI (AVV/DPA vorhanden); ohne OPENAI_API_KEY → regelbasierter Fallback.
  integration:
    build: ./integration
    profiles: ["controlling"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      # GoBD-Archiv (R2, §4 Säule 4): validiertes ZUGFeRD revisionssicher in MinIO-WORM ablegen.
      MINIO_URL: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      CONTROLLING_DB: ${CONTROLLING_DB:-controlling}
      CONTROLLING_USER: ${CONTROLLING_USER:-controlling}
      CONTROLLING_PASSWORD: ${CONTROLLING_PASSWORD:-controlling}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # Default Fixture-Mock; auf 'hubspot' setzen (+ HUBSPOT_TOKEN) für Real-Modus.
      INGESTION_SOURCE: ${INGESTION_SOURCE:-fixture}
      HUBSPOT_TOKEN: ${HUBSPOT_TOKEN:-}
      # L6-Filter: HubSpot-Pipeline-ID der Inhouse-Deals. Echte Default-Pipeline = `default`
      # (Label „Sales Pipeline"); der Fixture-Mock nutzt `inhouse`.
      HUBSPOT_INHOUSE_PIPELINE: ${HUBSPOT_INHOUSE_PIPELINE:-inhouse}
      # Naht zu Vendure (P1.3, §11.6): Shop-Projektion ruft die Vendure-Admin-API über den
      # Compose-Netz-Alias `server`; Auth via nativem Superadmin-Login.
      VENDURE_ADMIN_URL: http://server:3000
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-superadmin}
    ports:
      - "${INTEGRATION_PORT:-8090}:8090"

  # MDM-Cockpit (Formularverwaltung P1.0) — Vue-3-SPA (PrimeVue), per nginx ausgeliefert.
  # Verwaltungsmaske „Bildungsangebote"; spricht den integration-Service (/bildung, /q) über
  # den nginx-Proxy an. Typsicher generiert aus /q/openapi (Stack B). Profil `controlling`.
  mdm:
    build: ./mdm
    profiles: ["controlling"]
    restart: unless-stopped
    depends_on:
      - integration
    ports:
      - "${MDM_PORT:-5174}:80"

  # MinIO — S3-kompatibler Objektspeicher (self-host). Lightdash 0.3059 ERZWINGT S3
  # (Pre-Aggregate-Results); ohne S3-Env bricht der Start schon beim Config-Parsing ab.
  # Nur die S3-API (:9000) wird benötigt. Profil `controlling`.
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    profiles: ["controlling"]
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
    volumes:
      - minio_data:/data

  # Einmaliger Init: wartet bis MinIO bereit ist, legt den Lightdash-Bucket an, endet.
  minio-createbucket:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    profiles: ["controlling"]
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      LIGHTDASH_S3_BUCKET: ${LIGHTDASH_S3_BUCKET:-lightdash}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\"; do echo 'warte auf minio...'; sleep 2; done;
      mc mb --ignore-existing local/\"$${LIGHTDASH_S3_BUCKET}\";
      echo 'bucket bereit';
      "

  # Lightdash (Self-Serve-BI) auf die dbt-Marts (Schema `analytics` in DB `controlling`).
  # Metadaten in eigener DB `lightdash` (eigener User) desselben Postgres. Zugang NUR
  # über Keycloak-OIDC (Realm `ebz-staff`, Client `lightdash`). Profil `controlling`.
  lightdash:
    image: lightdash/lightdash:0.3059.0
    profiles: ["controlling"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-createbucket:
        condition: service_completed_successfully
    environment:
      # Metadaten-DB (eigene DB + User im gemeinsamen Postgres)
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${LIGHTDASH_USER:-lightdash}
      PGPASSWORD: ${LIGHTDASH_PASSWORD:-lightdash}
      PGDATABASE: ${LIGHTDASH_DB:-lightdash}
      LIGHTDASH_SECRET: ${LIGHTDASH_SECRET:-lightdash-dev-secret-change-me}
      SITE_URL: http://localhost:${LIGHTDASH_PORT:-8084}
      PORT: "8080"
      NODE_ENV: production
      SECURE_COOKIES: "false"
      TRUST_PROXY: "false"
      # ── S3 (MinIO) — von Lightdash 0.3059 erzwungen (Pre-Aggregate-Results) ──
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${LIGHTDASH_S3_BUCKET:-lightdash}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_FORCE_PATH_STYLE: "true"
      # dbt-Projekt (gemountet) — Lightdash kompiliert daraus die semantische Schicht.
      DBT_PROJECT_DIR: /usr/app/dbt
      # ── Keycloak-OIDC (Realm ebz-staff, Client lightdash) ──
      # Eine URL für Browser (Redirect) UND Container (Token/Discovery): keycloak.localhost:8080.
      AUTH_OIDC_CLIENT_ID: lightdash
      AUTH_OIDC_CLIENT_SECRET: ${LIGHTDASH_OIDC_SECRET:-lightdash-dev-secret}
      AUTH_OIDC_METADATA_DOCUMENT_URL: http://keycloak.localhost:8080/realms/ebz-staff/.well-known/openid-configuration
      AUTH_OIDC_AUTH_METHOD: client_secret_post
      # 'openid' ist Pflicht — sonst liefert Keycloak kein id_token (OAuth2 statt OIDC)
      # → Lightdash: "id_token not present in TokenSet". profile/email für JIT-Provisioning.
      AUTH_OIDC_SCOPES: "openid profile email"
      # Beim ersten Login Nutzer per E-Mail anlegen/verknüpfen (JIT-Provisioning).
      AUTH_ENABLE_OIDC_TO_EMAIL_LINKING: "true"
      # SSO-Gruppen → Lightdash-Gruppen (L23: Sichtbarkeit der Unternehmens-GuV).
      AUTH_ENABLE_GROUP_SYNC: "true"
      # L21: Passwort-Login bleibt für den Bootstrap zunächst AN; nach dem ersten
      # SSO-Admin-Login auf "true" setzen (SSO-Zwang) und neu hochfahren.
      AUTH_DISABLE_PASSWORD_AUTHENTICATION: ${LIGHTDASH_DISABLE_PW:-false}
    volumes:
      - ./dbt:/usr/app/dbt
    ports:
      - "${LIGHTDASH_PORT:-8084}:8080"

volumes:
  postgres_data:
  minio_data:
