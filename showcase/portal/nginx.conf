# EBZ Außenportal — nginx serviert die SPA + proxyt die API auf den Quarkus-integration-Service
# (Container `integration`). Gleicher Origin wie im Vite-Dev-Proxy. Keycloak läuft NICHT über nginx.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + Spec → Quarkus-Service (Compose-Netz, Servicename `integration`).
    location /party/ {
        proxy_pass http://integration:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /lms/ {
        proxy_pass http://integration:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    # System→Person: Aktivitätslog/Benachrichtigungen (+ SSE-Stream unter /kommunikation/portal/stream).
    location /kommunikation/ {
        proxy_pass http://integration:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE: kein Buffering, lange Verbindung (EventSource).
        proxy_buffering off;
        proxy_read_timeout 1h;
    }
    location /q/ {
        proxy_pass http://integration:8090;
        proxy_set_header Host $host;
    }

    # SPA-History-Fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
