<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EBZ Cockpit — Wireframe (Klickdummy)</title>
  <link rel="stylesheet" href="crm.css" />
</head>
<body>
  <!-- Topbar -->
  <header class="topbar">
    <div class="logo">EBZ&nbsp;Cockpit <small>Prozesse · Eingriffe · Stammdaten · Wireframe</small></div>
    <div class="search">
      <input id="search" type="text" placeholder="Suche: Name, Telefon, Firma, USt-IdNr …  ( / )" autocomplete="off" />
      <div id="searchResults" class="search-results"></div>
    </div>
    <div class="spacer"></div>
    <button class="btn sm" id="simCall" title="Eingehenden Anruf simulieren">📞 Anruf simulieren</button>
    <div class="user">
      <span class="role" id="roleBadge">crm-pflege</span>
      <span id="userName">Sandra Berg</span>
      <span class="avatar" id="userAvatar" style="width:30px;height:30px;font-size:12px">SB</span>
    </div>
  </header>

  <!-- ===== Einheitliche Cockpit-Shell (linke Schiene bleibt konstant) ===== -->
  <div class="cockpit" id="cockpit">
    <aside class="ck-rail">
      <nav class="ck-nav-list">
        <button class="ck-nav" data-nav="cockpit">📊 Cockpit</button>
        <button class="ck-nav" data-nav="eingriffe">⚠ Eingriffe <span class="navcount" id="cntEingriffe"></span></button>
        <button class="ck-nav" data-nav="sonder">✋ Sonderfälle <span class="navcount" id="cntSonder"></span></button>
        <button class="ck-nav" data-nav="kunden">👥 Kundenstamm (m:n)</button>
        <div class="ck-subnav">
          <button class="ck-subitem" id="newPerson">+ Person anlegen</button>
          <button class="ck-subitem" id="newOrg">+ Firma anlegen</button>
        </div>
      </nav>
      <div class="side-h">Zuletzt aufgerufen</div>
      <div id="quicklinksCk" class="ql-host"></div>
      <div class="side-h">Mein Profil</div>
      <button class="side-btn" id="showGroupsCk">👥 Gruppen &amp; Rolle</button>
    </aside>
    <main class="ck-main" id="ckMain"></main>
  </div>

  <!-- Modal host -->
  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modal"></div>
  </div>

  <!-- Toast (Anruf) -->
  <div class="toast" id="toast"></div>

  <script src="mock-data.js"></script>
  <script src="crm.js"></script>
</body>
</html>
